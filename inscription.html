<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Adhésion — City Stars BC</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
        <link rel="stylesheet" href="css/new-styles.css">
    </head>
    <body class="d-flex flex-column">
        <div id="site-header"></div>
        <main class="flex-shrink-0">
            <section class="py-5">
                <div class="container px-5 my-5">
                    <div class="row gx-5 justify-content-center">
                        <div class="col-lg-8">

                            <div class="text-center mb-5">
                                <div class="feature bg-primary bg-gradient text-white rounded-3 mb-3"><i class="bi bi-person-plus"></i></div>
                                <h1 class="fw-bolder">Rejoignez City Stars BC</h1>
                                <p class="lead fw-normal text-muted mb-0">Remplissez ce formulaire pour finaliser votre adhésion au club.</p>
                            </div>

                            <form id="inscriptionForm">

                                <!-- ── Section coordonnées ──────────────────────────────── -->
                                <h2 class="fw-bold mb-3 fs-5 text-uppercase text-muted border-bottom pb-2">Vos coordonnées</h2>

                                <div class="row gx-3">
                                    <div class="col-md-6 mb-3">
                                        <div class="form-floating">
                                            <input class="form-control" id="prenom" type="text" placeholder="Votre prénom" autocomplete="given-name" />
                                            <label for="prenom">Prénom</label>
                                        </div>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <div class="form-floating">
                                            <input class="form-control" id="nom" type="text" placeholder="Votre nom" autocomplete="family-name" />
                                            <label for="nom">Nom</label>
                                        </div>
                                    </div>
                                </div>
                                <div class="form-floating mb-3">
                                    <input class="form-control" id="courriel" type="email" placeholder="votre@email.fr" autocomplete="email" />
                                    <label for="courriel">Courriel</label>
                                </div>

                                <div class="form-floating mb-4">
                                    <input class="form-control" id="telephone-inscription" type="tel" placeholder=" " autocomplete="tel" />
                                    <label for="telephone-inscription">Téléphone</label>
                                </div>
                                <h2 class="fw-bold mb-3 fs-5 text-uppercase text-muted border-bottom pb-2">Niveau de pratique</h2>
                                <div class="mb-4">
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="radio" name="niveau" id="niveau-debutant" value="debutant" />
                                        <label class="form-check-label" for="niveau-debutant">Débutant — je n'ai jamais pratiqué le basket en club</label>
                                    </div>
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="radio" name="niveau" id="niveau-intermediaire" value="intermediaire" />
                                        <label class="form-check-label" for="niveau-intermediaire">Intermédiaire — j'ai déjà pratiqué occasionnellement</label>
                                    </div>
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="radio" name="niveau" id="niveau-confirme" value="confirme" />
                                        <label class="form-check-label" for="niveau-confirme">Confirmé — je pratique régulièrement depuis plusieurs années</label>
                                    </div>
                                </div>
                                <fieldset class="mb-4">
                                    <legend></legend>
                                    <h2 class="fw-bold mb-3 fs-5 text-uppercase text-muted border-bottom pb-2">Disponibilités</h2>
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="radio" name="dispo" id="dispo-mardi" value="mardi" />
                                        <label class="form-check-label" for="dispo-mardi">Mardi soir — 19h à 21h</label>
                                    </div>
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="radio" name="dispo" id="dispo-samedi" value="samedi" />
                                        <label class="form-check-label" for="dispo-samedi">Samedi matin — 10h à 12h</label>
                                    </div>
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="radio" name="dispo" id="dispo-mercredi" value="mercredi" />
                                        <label class="form-check-label" for="dispo-mercredi">Mercredi matin — 10h à 11h30 (section jeunes U14)</label>
                                    </div>
                                </fieldset>
                                <fieldset class="mb-5">
                                    <legend class="fw-bold mb-3 fs-5 text-uppercase text-muted border-bottom pb-2 w-100">Faites votre choix</legend>
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="radio" name="formule" id="formule-decouverte" value="decouverte" />
                                        <label class="form-check-label" for="formule-decouverte">
                                            <strong>Découverte</strong> — Gratuit · 1 séance d'essai
                                        </label>
                                    </div>
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="radio" name="formule" id="formule-loisir" value="loisir" />
                                        <label class="form-check-label" for="formule-loisir">
                                            <strong>Loisir</strong> — 180 €/an · Entraînements illimités + matchs amicaux
                                        </label>
                                    </div>
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="radio" name="formule" id="formule-competition" value="competition" />
                                        <label class="form-check-label" for="formule-competition">
                                            <strong>Compétition</strong> — 320 €/an · Tout inclus + licence sportive
                                        </label>
                                    </div>
                                </fieldset>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-lg">Soumettre ma demande d'adhésion</button>
                                </div>

                            </form>

                        </div>
                    </div>
                </div>
            </section>
        </main>
        <div id="site-footer"></div>
        <script src="js/include-partials.js"></script>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="js/scripts.js"></script>
    </body>
</html>
